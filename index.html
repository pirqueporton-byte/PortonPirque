<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portón Pirque</title>
<meta name="theme-color" content="#1F4A32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portón Pirque">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
  :root{
    --bg:#EFF3EE; --bg-alt:#E6ECE3; --card:#FFFFFF; --ink:#1E2A22; --muted:#657367;
    --line:#DEE5DB; --accent:#2F6B4F; --accent-dark:#1F4A32; --accent-soft:#E4EEE7;
    --brass:#B8863F; --brass-soft:#F3E6CE; --danger:#B23B2E; --danger-soft:#F7E4E1;
    --warn:#C98A2A; --warn-soft:#FBEEDB; --radius-lg:26px; --radius-md:16px; --radius-sm:10px;
    --shadow:0 20px 50px -18px rgba(31,74,50,0.28); --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif; --font-mono:'JetBrains Mono', 'SFMono-Regular', monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; font-family:var(--font-body); color:var(--ink); background:repeating-linear-gradient(90deg, rgba(31,74,50,0.035) 0 2px, transparent 2px 46px), radial-gradient(circle at 15% 10%, var(--bg-alt), transparent 55%), var(--bg); display:flex; align-items:flex-start; justify-content:center; padding:28px 16px 60px; }
  .phone{ width:100%; max-width:440px; background:var(--card); border-radius:var(--radius-lg); box-shadow:var(--shadow); overflow:hidden; position:relative; border:1px solid rgba(31,74,50,0.06); }
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px 0; min-height:44px; }
  .brand-mini{ display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .dot-live{ width:7px;height:7px;border-radius:50%; background:var(--accent); animation:pulse 2.4s infinite; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(47,107,79,.45); } 70%{ box-shadow:0 0 0 8px rgba(47,107,79,0); } 100%{ box-shadow:0 0 0 0 rgba(47,107,79,0); } }
  .status-bar{ display:inline-flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; font-weight:500; padding:6px 13px; border-radius:999px; margin:2px 20px 0; }
  .status-dot{ width:7px;height:7px;border-radius:50%; }
  .status-connecting{ background:var(--bg); color:var(--muted); }
  .status-online{ background:var(--accent-soft); color:var(--accent-dark); }
  .status-offline{ background:var(--danger-soft); color:var(--danger); }
  .gate-btn:active{ transform:scale(0.92); filter:brightness(0.85); box-shadow:inset 0 12px 22px rgba(0,0,0,.4); }
  .offline-msg{ display:none; text-align:center; font-size:12.5px; font-weight:600; color:var(--danger); background:var(--danger-soft); border-radius:var(--radius-sm); padding:10px 14px; margin-top:16px; }
  .icon-btn{ width:38px;height:38px; border-radius:50%; border:1px solid var(--line); background:var(--card); display:flex;align-items:center;justify-content:center; cursor:pointer; }
  .screen{ padding:8px 28px 34px; display:none; }
  .screen.active{ display:block; }
  .title{ font-family:var(--font-display); font-weight:600; font-size:34px; line-height:1.05; margin:0 0 8px; color:var(--accent-dark); }
  .sub{ color:var(--muted); font-size:14.5px; line-height:1.5; margin:0 0 28px; }
  .gate-mark{ width:64px; height:64px; margin-bottom:6px; }
  .btn-google{ width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:#fff; border:1px solid #DADCE0; color:#3C4043; font-weight:600; padding:13px 18px; border-radius:999px; cursor:pointer; }
  .btn{ width:100%; border:none; border-radius:999px; padding:13px 18px; font-weight:600; cursor:pointer; }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--muted); border:1px solid var(--line); }
  .btn-warn{ background:var(--warn-soft); color:var(--warn); }
  .btn-small{ width:auto; padding:9px 16px; font-size:13px; }
  .link-quiet{ background:none;border:none;color:var(--muted); font-size:13px; cursor:pointer; text-decoration:underline; }
  .user-chip{ display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border-radius:999px; margin-bottom:26px; }
  .gate-stage{ display:flex; flex-direction:column; align-items:center; padding:14px 0 8px; }
  .gate-btn-wrap{ position:relative; width:220px; height:220px; }
  .gate-bezel{ width:220px; height:220px; border-radius:50%; background:conic-gradient(from 210deg, #D9B166, #8F6423, #D9B166); padding:10px; }
  .gate-btn{ width:100%; height:100%; border-radius:50%; border:none; cursor:pointer; background:radial-gradient(circle at 34% 30%, #3E8863, var(--accent-dark) 78%); display:flex; align-items:center; justify-content:center; transition:transform .12s ease; }
  .gate-edit-badge{ position:absolute; right:2px; bottom:2px; width:42px; height:42px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .toast{ position:fixed; left:50%; bottom:28px; background:var(--ink); color:#fff; padding:12px 18px; border-radius:999px; opacity:0; pointer-events:none; transition:.28s; }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }
  .card{ background:var(--bg); border-radius:var(--radius-md); padding:18px; margin-top:14px; border:1px solid var(--line); }
  .row-input{ width:100%; padding:10px 12px; margin-bottom:8px; border:1px solid var(--line); border-radius:var(--radius-sm); }
  .list-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .icon-action{ width:28px;height:28px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .ia-no{ background:var(--danger-soft); color:var(--danger); }
</style>
</head>
<body>

<div class="phone">
  <div class="topbar">
    <div class="brand-mini"><span class="dot-live"></span> Portón Pirque</div>
    <button id="btn-panel-shortcut" class="icon-btn" onclick="mostrarVista('admin')" style="display:none">⚙️</button>
  </div>
  <div id="conexion-status" class="status-bar status-connecting"><span class="status-dot"></span><span id="conexion-status-text">Conectando…</span></div>

  <section id="vista-login" class="screen active">
    <h1 class="title">Portón Pirque</h1>
    <button class="btn-google" id="btn-google" onclick="iniciarSesion()">Continuar con Google</button>
  </section>

  <section id="vista-autorizado" class="screen">
    <div id="user-chip" class="user-chip"></div>
    <div class="gate-stage">
      <div class="status-label" id="gate-status-label">Portón listo</div>
      <div class="gate-btn-wrap">
        <div class="gate-bezel">
          <button id="gate-btn" class="gate-btn" onclick="abrirPorton()">🔓</button>
        </div>
        <button class="gate-edit-badge" onclick="document.getElementById('foto-input').click()">📷</button>
        <input type="file" id="foto-input" style="display:none" onchange="cambiarFotoBoton(event)">
      </div>
      <p id="offline-msg" class="offline-msg">⚠️ El portón está desconectado.</p>
    </div>
  </section>

  <section id="vista-admin" class="screen">
    <h2>Panel de control</h2>
    <div class="card">
      <h3>📶 Redes WiFi</h3>
      <input type="text" id="red-ssid" class="row-input" placeholder="SSID">
      <input type="password" id="red-pass" class="row-input" placeholder="Pass">
      <button class="btn btn-warn btn-small" onclick="agregarRed()">Añadir</button>
      <div id="lista-redes"></div>
    </div>
    <button class="btn btn-ghost" onclick="cerrarSesion()">Cerrar sesión</button>
  </section>
</div>

<div id="toast" class="toast"><span id="toast-msg"></span></div>

<script>
const firebaseConfig = { /* ... tu config ... */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth(), provider = new firebase.auth.GoogleAuthProvider();
const startTime = performance.now();

function setEstadoConexion(estado) {
  const badge = document.getElementById('conexion-status');
  if (performance.now() - startTime < 5000 && estado === 'offline') return;
  badge.className = 'status-bar status-' + estado;
  document.getElementById('conexion-status-text').textContent = estado === 'online' ? 'En línea' : 'Fuera de línea';
  document.getElementById('gate-btn').disabled = (estado === 'offline');
  document.getElementById('offline-msg').style.display = (estado === 'offline') ? 'block' : 'none';
}

function abrirPorton() {
  new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3').play();
  db.ref('estado_porton').update({ comando: 'abrir_' + Date.now(), timestamp: firebase.database.ServerValue.TIMESTAMP });
  showToast('Orden enviada');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function renderRedes(obj) {
  const el = document.getElementById('lista-redes');
  const keys = Object.keys(obj || {});
  el.innerHTML = keys.map(key => `
    <div class="list-row">
      <span>${obj[key].ssid}</span>
      <button class="icon-action ia-no" onclick="eliminarRed('${key}')">X</button>
    </div>`).join('');
}

function cargarDatosAdmin() {
  db.ref('configuracion/redes_wifi').on('value', (snap) => renderRedes(snap.val()));
}

// ... (Resto de tus funciones originales de auth, login, etc. siguen igual)
</script>
</body>
</html>
